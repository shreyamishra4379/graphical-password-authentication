<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Glassmorphism Login Page</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --accent: #00ffcc;
      --glass-bg: rgba(30,30,30,0.65); /* slightly darker */
      --glass-border: rgba(255,255,255,0.08);
      --input-bg: rgba(255,255,255,0.15);
      --white: #ffffff;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url("/templates/pic1.jpg") repeat center center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
    }

    /* Top Navigation Bar */
    .top-bar {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 12px 25px;
      gap: 20px;
      margin-bottom: 30px;
      background: rgba(255,255,255,0.15);
      border-radius: 15px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .nav-text { 
      color: var(--white); 
      text-decoration: none; 
      font-weight: 600; 
      font-size: 16px; 
      transition: color .2s ease; 
    }
    .nav-text:hover { color: var(--accent); }

    .nav-btn {
      padding: 8px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      transition: transform .12s ease, filter .12s ease;
    }
    .login-btn { background: var(--white); color: #111; }
    .signup-btn { background: var(--accent); color: #111; }
    .nav-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

    .page-wrapper {
      width: 100%;
      max-width: 1000px;
      padding: 50px;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* LOGIN BOX */
    .login-box {
      width: 100%;
      min-height: 520px; /* ⬆️ Increased height */
      display: flex;
      gap: 50px;
      padding: 50px 40px; /* slightly more padding */
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), var(--glass-bg));
      border: 1px solid var(--glass-border);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55);
      color: var(--white);
      box-sizing: border-box;
      align-items: center;
      backdrop-filter: blur(20px);
    }

    .login-left img {
      width: 300px;
      max-width: 100%;
      border-radius: 15px;
      object-fit: cover;
      display: block;
      margin: 0 auto;
    }

    .login-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: left;
    }

    .login-right h2 { 
      margin: 0; 
      font-size: 40px; 
      font-weight: 700; 
      letter-spacing: 0.4px; 
    }

    .welcome-msg { 
      font-size: 30px; 
      font-weight: 700; 
      margin: 0 0 12px 0; 
      color: rgba(255,255,255,0.9); 
    }

    .input-row {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-top: 10px;
    }

    .input-group { position: relative; width: 100%; }

    .input-group input {
      width: 100%;
      height: 56px;
      padding: 12px 48px 12px 18px;
      border-radius: 32px;
      border: none;
      background: var(--input-bg);
      color: var(--white);
      outline: none;
      font-size: 16px;
      box-sizing: border-box;
      transition: box-shadow .18s ease;
    }
    .input-group input::placeholder { color: rgba(255,255,255,0.6); }

    .input-group .icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 18px;
    }

    .btn { 
      margin-top: 8px; 
      width: 100%; 
      height: 56px; 
      border-radius: 32px; 
      border: none; 
      font-weight: 700; 
      font-size: 17px; 
      cursor: pointer; 
      background: var(--white); 
      color: #111; 
      transition: transform .12s ease, filter .12s ease; 
    }
    .btn:hover { transform: translateY(-2px); filter: brightness(.98); }

    @media (max-width: 700px) {
      .login-box { flex-direction: column; text-align: center; align-items: center; }
      .login-left img { width: 100%; margin-bottom: 25px; }
      .login-right { text-align: center; }
    }
  </style>
</head>
<body>

  <!-- Top Navigation Bar -->
  <div class="top-bar">
    <a href="/home" class="nav-text">Home</a>
    <a href="/contact" class="nav-text">Contact</a>
    <a href="/login1" class="nav-btn login-btn">Login</a>
    <a href="/signup" class="nav-btn signup-btn">Sign Up</a>
  </div>

  <div class="page-wrapper">
    <div class="login-box" role="main" aria-labelledby="loginTitle">

      <!-- LEFT IMAGE -->
      <div class="login-left">
        <img src="/templates/1.png" alt="Login Illustration">
      </div>

      <!-- RIGHT FORM -->
      <div class="login-right">
       <p class="welcome-msg">Welcome back :)</p>
        <h2 id="loginTitle">Login</h2>

        <!-- ✅ Flask Form -->
        <form action="/login1" method="POST" class="input-row">
  <div class="input-group">
    <input name="username" type="text" placeholder="Email" autocomplete="username" required />
    <i class="fa fa-user icon"></i>
  </div>

  <div class="input-group">
    <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
    <i class="fa fa-eye icon" id="togglePassword" style="cursor:pointer;"></i>
  </div>

  <!-- Remember Me Checkbox -->
  <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
    <input type="checkbox" name="remember" id="remember" />
    <label for="remember" style="color: rgba(255,255,255,0.8); font-size: 14px;">Remember Me</label>
  </div>

  <button class="btn" type="submit">Login</button>
</form>

      </div>

    </div>
  </div>
  <script>
  const togglePassword = document.querySelector('#togglePassword');
  const password = document.querySelector('#password');

  togglePassword.addEventListener('click', function () {
    // toggle the type attribute
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);

    // toggle the eye / eye-slash icon
    this.classList.toggle('fa-eye-slash');
  });
</script>

</body>
</html>
